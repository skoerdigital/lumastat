<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 34" fill="none">
  <!-- Dark rounded background -->
  <rect width="34" height="34" rx="8" fill="#16160F"/>
  <!-- Outer bulb (circle arc + base + dome) -->
  <path d="M17,4 A9,9 0 0,1 23.2,19.5 L23.2,26 Q23.2,30 17,30 Q10.8,30 10.8,26 L10.8,19.5 A9,9 0 0,1 17,4Z"
        fill="#16160F" stroke="#F1EEE3" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Base ribs -->
  <line x1="10.8" y1="21.5" x2="23.2" y2="21.5" stroke="#F1EEE3" stroke-width="1.8"/>
  <line x1="10.8" y1="24" x2="23.2" y2="24" stroke="#F1EEE3" stroke-width="1.8"/>
  <!-- Pie circle (purple accent) -->
  <circle cx="17" cy="13" r="5.8" fill="#16160F" stroke="#D9A8F0" stroke-width="1.8"/>
  <!-- Pie dividers (Y-shape, 3 equal segments) -->
  <line x1="17" y1="13" x2="17" y2="7.2" stroke="#F1EEE3" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="17" y1="13" x2="22" y2="15.9" stroke="#F1EEE3" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="17" y1="13" x2="12" y2="15.9" stroke="#F1EEE3" stroke-width="1.6" stroke-linecap="round"/>
</svg>
