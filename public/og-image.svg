<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F1EEE3"/>

  <!-- Decorative blobs -->
  <circle cx="1080" cy="120" r="180" fill="#D9A8F0" opacity="0.5"/>
  <rect x="900" y="400" width="220" height="220" rx="60" fill="#F3E04E" opacity="0.45"/>
  <circle cx="140" cy="520" r="120" fill="#D9A8F0" opacity="0.25"/>

  <!-- Logo mark (lightbulb + pie chart) -->
  <svg x="80" y="46" width="66" height="80" viewBox="0 0 64 78">
    <path d="M32,7 A21,21 0 0,1 44,45.2 L44,62 Q44,72 32,72 Q20,72 20,62 L20,45.2 A21,21 0 0,1 32,7Z"
          fill="#F1EEE3" stroke="#16160F" stroke-width="4.5" stroke-linejoin="round"/>
    <line x1="20" y1="49" x2="44" y2="49" stroke="#16160F" stroke-width="4"/>
    <line x1="20" y1="54.5" x2="44" y2="54.5" stroke="#16160F" stroke-width="4"/>
    <line x1="20" y1="60" x2="44" y2="60" stroke="#16160F" stroke-width="4"/>
    <circle cx="32" cy="28" r="13.5" fill="#F1EEE3" stroke="#D9A8F0" stroke-width="4"/>
    <line x1="32" y1="28" x2="32" y2="14.5" stroke="#16160F" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="32" y1="28" x2="43.7" y2="34.75" stroke="#16160F" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="32" y1="28" x2="20.3" y2="34.75" stroke="#16160F" stroke-width="3.5" stroke-linecap="round"/>
  </svg>

  <!-- Brand name -->
  <text x="196" y="111" font-family="system-ui,-apple-system,Helvetica Neue,sans-serif" font-size="52" font-weight="800" letter-spacing="-1.5" fill="#16160F">Lumastat</text>

  <!-- Main headline -->
  <text x="80" y="270" font-family="system-ui,-apple-system,Helvetica Neue,sans-serif" font-size="88" font-weight="800" letter-spacing="-3" fill="#16160F">Deep web analytics,</text>
  <!-- Yellow underline highlight -->
  <rect x="80" y="342" width="620" height="20" rx="5" fill="#F3E04E" opacity="0.9"/>
  <text x="80" y="360" font-family="system-ui,-apple-system,Helvetica Neue,sans-serif" font-size="88" font-weight="800" letter-spacing="-3" fill="#16160F">without the cookies.</text>

  <!-- Subtext -->
  <text x="80" y="448" font-family="system-ui,-apple-system,Helvetica Neue,sans-serif" font-size="34" font-weight="500" fill="#56564a">No cookies · No consent banner · GDPR by design · EEA-hosted</text>

  <!-- CTA pill -->
  <rect x="80" y="490" width="252" height="58" rx="29" fill="#16160F"/>
  <text x="206" y="527" text-anchor="middle" font-family="system-ui,-apple-system,Helvetica Neue,sans-serif" font-size="22" font-weight="700" fill="#F1EEE3">Join the waitlist</text>

  <defs><filter id="blur"><feGaussianBlur stdDeviation="8"/></filter></defs>
</svg>
